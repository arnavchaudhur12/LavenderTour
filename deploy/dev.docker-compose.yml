services:
  backend:
    build:
      context: /opt/lavendertour/repo/backend
    container_name: lavendertour-backend-dev
    restart: unless-stopped
    env_file:
      - /opt/lavendertour/dev/.env.dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8003:8000"

  frontend:
    build:
      context: /opt/lavendertour/repo/frontend
    container_name: lavendertour-frontend-dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://dev.lavendertour.in/api
      NODE_ENV: production
    ports:
      - "4002:3000"
    depends_on:
      - backend
